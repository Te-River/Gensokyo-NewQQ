name: Security hardening verification

on:
  push:
    branches:
      - main
      - fix/security-hardening-v2
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          files=$(gofmt -l imagehosting securityaudit security_bootstrap.go)
          if [ -n "$files" ]; then
            echo "Files requiring gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Run focused race tests
        run: go test -race ./imagehosting ./securityaudit

      - name: Run full test suite
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...
